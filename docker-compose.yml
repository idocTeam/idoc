services:
  gateway:
    build:
      context: ./gateway
    container_name: idoc-gateway
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      ADMIN_SERVICE_URL: http://admin-service:5004
      DOCTOR_SERVICE_URL: http://doctor-service:5002
      PATIENT_SERVICE_URL: http://patient-service:5003
      APPOINTMENT_SERVICE_URL: http://appointment-service:5007
      PAYMENT_SERVICE_URL: http://payment-service:5005
      TELEMEDICINE_SERVICE_URL: http://telemedicine-service:5006
      NOTIFICATION_SERVICE_URL: http://notification-service:5008
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost:80
    depends_on:
      - admin-service
      - doctor-service
      - patient-service
      - appointment-service
      - payment-service
      - telemedicine-service
      - notification-service
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
    container_name: idoc-frontend
    ports:
      - "5173:80"
    depends_on:
      - gateway
    restart: unless-stopped

  admin-service:
    build:
      context: ./services/admin-service
    container_name: idoc-admin-service
    ports:
      - "5004:5004"
    env_file:
      - ./services/admin-service/.env
    environment:
      PORT: 5004
      DOCTOR_SERVICE_URL: http://doctor-service:5002
      PATIENT_SERVICE_URL: http://patient-service:5003
    restart: unless-stopped

  doctor-service:
    build:
      context: ./services/doctor-service
    container_name: idoc-doctor-service
    ports:
      - "5002:5002"
    env_file:
      - ./services/doctor-service/.env
    environment:
      PORT: 5002
    restart: unless-stopped

  patient-service:
    build:
      context: ./services/patient-service
    container_name: idoc-patient-service
    ports:
      - "5003:5003"
    env_file:
      - ./services/patient-service/.env
    environment:
      PORT: 5003
    volumes:
      - patient_uploads:/app/uploads
    restart: unless-stopped

  appointment-service:
    build:
      context: ./services/appointment-service
    container_name: idoc-appointment-service
    ports:
      - "5007:5007"
    env_file:
      - ./services/appointment-service/.env
    environment:
      PORT: 5007
      #MONGO_URI: mongodb://idoc-mongodb:27017/idoc_appointment
      DOCTOR_SERVICE_URL: http://doctor-service:5002
      PATIENT_SERVICE_URL: http://patient-service:5003
      NOTIFICATION_SERVICE_URL: http://notification-service:5008
    depends_on:
      - mongodb
      - patient-service
      - notification-service
    restart: unless-stopped

  payment-service:
    build:
      context: ./services/payment-service
    container_name: idoc-payment-service
    ports:
      - "5005:5005"
    env_file:
      - ./services/payment-service/.env
    environment:
      PORT: 5005
      #MONGO_URI: mongodb://idoc-mongodb:27017/idoc_payment
      APPOINTMENT_SERVICE_URL: http://appointment-service:5007
      TELEMEDICINE_SERVICE_URL: http://telemedicine-service:5006
      PATIENT_SERVICE_URL: http://patient-service:5003
      PAYMENT_SERVICE_URL: http://payment-service:5005
    depends_on:
      - appointment-service
      - mongodb
    restart: unless-stopped

  telemedicine-service:
    build:
      context: ./services/telemedicine-service
    container_name: idoc-telemedicine-service
    ports:
      - "5006:5006"
    env_file:
      - ./services/telemedicine-service/.env
    environment:
      PORT: 5006
      #MONGO_URI: mongodb://idoc-mongodb:27017/idoc_telemedicine
    depends_on:
      - mongodb
    restart: unless-stopped

  notification-service:
    build:
      context: ./services/notification-service
    container_name: idoc-notification-service
    ports:
      - "5008:5008"
    env_file:
      - ./services/notification-service/.env
    environment:
      PORT: 5008
    depends_on:
      - mongodb
    restart: unless-stopped

  ai-symptoms-service:
    build:
      context: ./services/ai-symptoms-service
    container_name: idoc-ai-symptoms-service
    ports:
      - "3007:3007"
    env_file:
      - ./services/ai-symptoms-service/.env
    environment:
      PORT: 3007
    depends_on:
      - mongodb
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    container_name: idoc-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  patient_uploads:
  mongo_data: