apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: idoc
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: idoc
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
