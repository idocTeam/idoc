apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: idoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      containers:
        - name: patient-service
          image: idoc/patient-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5003
          env:
            - name: PORT
              value: "5003"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: idoc-secrets
                  key: patient-mongo-uri
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: idoc-secrets
                  key: patient-jwt-secret
            - name: JWT_EXPIRES_IN
              valueFrom:
                secretKeyRef:
                  name: idoc-secrets
                  key: jwt-expires-in
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: idoc-secrets
                  key: internal-service-secret
          volumeMounts:
            - name: patient-uploads
              mountPath: /app/uploads
      volumes:
        - name: patient-uploads
          persistentVolumeClaim:
            claimName: patient-uploads-pvc
---
