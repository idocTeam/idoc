apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: idoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: idoc/frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: idoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: idoc/gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: ADMIN_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: idoc-config
                  key: admin-service-url
            - name: DOCTOR_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: idoc-config
                  key: doctor-service-url
            - name: PATIENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: idoc-config
                  key: patient-service-url
            - name: APPOINTMENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: idoc-config
                  key: appointment-service-url
            - name: PAYMENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: idoc-config
                  key: payment-service-url
            - name: TELEMEDICINE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: idoc-config
                  key: telemedicine-service-url
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: idoc-config
                  key: notification-service-url
            - name: AI_SYMPTOMS_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: idoc-config
                  key: ai-symptoms-service-url
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: idoc-config
                  key: gateway-cors-origins
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
  namespace: idoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
    spec:
      containers:
        - name: admin-service
          image: idoc/admin-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5004
          env:
            - name: PORT
              value: "5004"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: idoc-secrets
                  key: admin-jwt-secret
            - name: JWT_EXPIRES_IN
              valueFrom:
                secretKeyRef:
                  name: idoc-secrets
                  key: jwt-expires-in
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: idoc-secrets
                  key: admin-email
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: idoc-secrets
                  key: admin-password
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: idoc-secrets
                  key: internal-service-secret
            - name: DOCTOR_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: idoc-config
                  key: doctor-service-url
            - name: PATIENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: idoc-config
                  key: patient-service-url
---
