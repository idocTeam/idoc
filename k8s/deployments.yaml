apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-symptoms-service
  namespace: idoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-symptoms-service
  template:
    metadata:
      labels:
        app: ai-symptoms-service
    spec:
      containers:
        - name: ai-symptoms-service
          image: idoc/ai-symptoms-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3007
          env:
            - name: PORT
              value: "3007"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: idoc-config
                  key: node-env
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: idoc-secrets
                  key: ai-symptoms-mongo-uri
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: idoc-secrets
                  key: openrouter-api-key
            - name: OPENROUTER_MODEL
              valueFrom:
                configMapKeyRef:
                  name: idoc-config
                  key: openrouter-model
            - name: OPENROUTER_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: idoc-config
                  key: openrouter-base-url
            - name: PATIENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: idoc-config
                  key: ai-symptoms-patient-service-url
